<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrambledWeb</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #0f172a, #1e293b);
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 600px;
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #4f46e5;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Scrambled Web</h1>
    <p id="text">
      Project
    </p>

    <button class="btn" onclick="changeText()">Very</button>
  </div>

  <script>
    function changeText() {
      document.getElementById("text").textContent =
        "Exciting Project";
    }
  </script>

</body>
</html>
